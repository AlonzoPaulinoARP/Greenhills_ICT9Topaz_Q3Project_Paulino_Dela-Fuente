    <br><br><br>
    <div class="container mt-4">
        <form class="box mt-4" id="form" action="page6.html" method="post">
            <h1 class="text-center"> Registration Form</h1>
            <p class="text-center" style="color: #000000;">Fill out the form to register</p>
            <h2 class="h5"> Info</h2>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Birthday</label>
                    <input type="date" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Gender</label>
                    <select class="form-control">
                        <option disabled selected>Select</option>
                        <option required>Male</option>
                        <option required>Female</option>
                        <option required>Other</option>
                    </select>
                </div>
            </div>
            <h2 class="h5 mt-4">Contact Information</h2>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Email </label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="number" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" required>
                </div>
            </div>
            <div class="form-check mt-3">
                <input class="form-check-input" type="checkbox" required>
                <label class="form-check-label">
                    I agree to the terms and policies
                </label>
            </div>
            <button type="submit" class="btn btn-success w-25 mt-4" id="submitButton" value="Go to another page" enabled>Submit</button>
            <button type="reset" class="btn btn-danger w-25 mt-4">Clear</button>
        </form>
        <p class="text-center text-black mt-3">
        </p>
